name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: pricing
          POSTGRES_PASSWORD: pricing
          POSTGRES_DB: pricing_simulator
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U pricing -d pricing_simulator"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+psycopg://pricing:pricing@localhost:5432/pricing_simulator
      MPLBACKEND: Agg

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package and dev tools
        run: pip install -e ".[dev]"

      - name: Migrations
        run: alembic upgrade head

      - name: Ruff check
        run: ruff check app tests

      - name: Ruff format check
        run: ruff format app tests --check

      - name: Mypy
        run: mypy app tests

      - name: Pytest (including notebook execution)
        run: pytest tests -q
        timeout-minutes: 30
