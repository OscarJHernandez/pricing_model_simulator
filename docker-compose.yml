services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: pricing
      POSTGRES_PASSWORD: pricing
      POSTGRES_DB: pricing_simulator
    # Host 5433 avoids clashing with a local Postgres on 5432 (Homebrew / Postgres.app).
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
